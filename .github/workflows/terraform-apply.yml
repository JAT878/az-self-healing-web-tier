name: Terraform Apply

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: terraform init
        run: terraform init -input=false

    
      - name: Generate throwaway SSH key
        run: ssh-keygen -t ed25519 -N "" -f /tmp/ci_key -C "ci"

      - name: terraform plan
        run: terraform plan -input=false -var="admin_ssh_public_key=$(cat /tmp/ci_key.pub)"

      - name: terraform apply
        run: terraform apply -input=false -auto-approve -var="admin_ssh_public_key=$(cat /tmp/ci_key.pub)"

      - name: Show web URL
        run: terraform output web_url
